# Immich — managed manually on VM 100.
# Source-of-truth lives at homelab-configs/immich/docker-compose.yml (target).
# Image pin via .env (IMMICH_VERSION=v2.7.5 — see project_immich_install_plan.md).
# Upstream template fetched from:
#   https://github.com/immich-app/immich/releases/download/v2.7.5/docker-compose.yml
# Local customizations:
#   - mem_limit on every service (VM 100 OOM history — see project_vm100_pihole_grafana_fix.md)
#   - Traefik labels for photos.local.example.home (proxy-internal network pattern)
#   - Connected to proxy-internal so Traefik can reach immich-server
#   - Removed host-port bind on 2283 (only Traefik should reach it)

name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION}
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    depends_on:
      - redis
      - database
    restart: always
    mem_limit: 2g
    networks:
      - default
      - proxy-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-internal"
      - "traefik.http.routers.immich.rule=Host(`photos.local.example.home`)"
      - "traefik.http.routers.immich.entrypoints=https"
      - "traefik.http.routers.immich.tls.certresolver=cloudflare"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION}
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    mem_limit: 3g
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    restart: always
    mem_limit: 256m
    healthcheck:
      test: redis-cli ping || exit 1

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    mem_limit: 1g
    healthcheck:
      disable: false

volumes:
  model-cache:

networks:
  proxy-internal:
    external: true
