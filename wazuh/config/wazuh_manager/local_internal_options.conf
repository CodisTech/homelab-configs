# local_internal_options.conf
#
# This file should be handled with care. It contains
# run time modifications that can affect the use
# of OSSEC. Only change it if you know what you
# are doing. Look first at ossec.conf
# for most of the things you want to change.
#
# This file will not be overwritten during upgrades.

# Bumped from default 256 — Suricata eve.json events have ~307 fields.
# Default caused 1.3M/day "Too many fields for JSON decoder" errors.
# Set to 512 for headroom; valid range [32..1024]. Added 2026-05-02.
analysisd.decoder_order_size=512
