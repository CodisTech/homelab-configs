<agent_config>

  <!-- Rootcheck ignores — added 2026-05-02 -->
  <!-- containerd overlayfs snapshots flag as "hidden from stats but show on readdir." -->
  <!-- This is normal containerd behavior, not a rootkit. Path only exists on k3s nodes; -->
  <!-- harmless no-op on agents without containerd. -->
  <rootcheck>
    <ignore>/var/lib/rancher/k3s/agent/containerd</ignore>
  </rootcheck>

</agent_config>

<!-- Suricata-only FIM ignore — added 2026-05-03 -->
<!-- eve.json is rotated daily via copytruncate, which preserves the inode but -->
<!-- shrinks file size to 0. Wazuh FIM rule 553 fires "File size reduced -->
<!-- (inode remained)" every day at 00:00. Benign rotation, not security-relevant. -->
<!-- Wazuh's eve.json content ingestion (via the localfile tail) is unaffected. -->
<agent_config name="suricata">
  <syscheck>
    <ignore>/var/log/suricata/eve.json</ignore>
  </syscheck>
</agent_config>
