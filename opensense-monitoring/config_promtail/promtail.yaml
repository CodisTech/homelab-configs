# Host-level Promtail on VM 100.
# Ships:
#   - Wazuh manager alerts.json (SIEM detections)
#   - All running Docker containers on this host
# Auth: mTLS-optional. Verifies Loki's server cert against ca.crt; no client
# cert presented (Loki has client_auth_type: VerifyClientCertIfGiven).

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: https://loki:3100/loki/api/v1/push
    tls_config:
      ca_file: /etc/promtail/certs/ca.crt
      insecure_skip_verify: false

scrape_configs:
  # ----------------------------------------------------------------
  # Wazuh SIEM alerts (alerts.json — one JSON object per line)
  # ----------------------------------------------------------------
  - job_name: wazuh_alerts
    static_configs:
      - targets: [localhost]
        labels:
          job: wazuh
          host: vm-100
          source: wazuh-alerts
          __path__: /var/log/wazuh/alerts/alerts.json
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            rule_level: rule.level
            rule_id: rule.id
            rule_description: rule.description
            agent_name: agent.name
            agent_id: agent.id
            location: location
      # Keep cardinality tight: don't promote rule_description (high-cardinality)
      - labels:
          rule_level:
          rule_id:
          agent_name:
      - timestamp:
          source: timestamp
          format: 2006-01-02T15:04:05.999-0700
      - drop:
          older_than: 1h
          drop_counter_reason: backlog_skip

  # ----------------------------------------------------------------
  # Local Docker container logs (json-file driver)
  # ----------------------------------------------------------------
  - job_name: docker_vm100
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Strip the leading slash docker prepends to container names
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: compose_project
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: compose_service
      - target_label: host
        replacement: vm-100
      - target_label: job
        replacement: docker
    pipeline_stages:
      - drop:
          older_than: 1h
          drop_counter_reason: backlog_skip

  # ----------------------------------------------------------------
  # OPNsense syslog (TCP RFC5424) — added 2026-05-02
  # OPNsense sends to VM 100 :1514/tcp; promtail parses syslog and
  # promotes hostname/severity/app to labels.
  # ----------------------------------------------------------------
  - job_name: opnsense_syslog
    syslog:
      listen_address: 0.0.0.0:1601
      listen_protocol: tcp
      idle_timeout: 60s
      label_structured_data: yes
      labels:
        job: opnsense
    relabel_configs:
      - source_labels: ['__syslog_message_hostname']
        target_label: 'host'
      - source_labels: ['__syslog_message_severity']
        target_label: 'severity'
      - source_labels: ['__syslog_message_facility']
        target_label: 'facility'
      - source_labels: ['__syslog_message_app_name']
        target_label: 'app'
